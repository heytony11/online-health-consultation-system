<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Admin Panel - Doctor Approval</h2>

<div id="doctorList"></div>

</div>

<script>

async function loadDoctors(){

let res = await fetch("/api/admin/doctors");

let doctors = await res.json();

let html="";

doctors.forEach(d=>{

html += `
<div class="card p-3 mb-3">

<h5>${d.name}</h5>

<p>Specialization: ${d.specialization}</p>
<p>Experience: ${d.experience}</p>
<p>Status: ${d.approved ? "Approved" : "Pending"}</p>

<button class="btn btn-success" onclick="approve('${d._id}')">
Approve
</button>

</div>
`

})

document.getElementById("doctorList").innerHTML = html;

}

async function approve(id){

let res = await fetch("/api/admin/approveDoctor/"+id,{
method:"POST"
})

let msg = await res.text();

alert(msg);

loadDoctors();

}

loadDoctors();

</script>

</body>
</html>
